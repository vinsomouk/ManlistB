nelmio_cors:
    defaults:
        origin_regex: false
        allow_origin:
            - '%env(CORS_ALLOW_ORIGIN)%'
        allow_methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
        allow_headers:
            - Content-Type
            - Authorization
            - Accept
            - Origin
            - X-Requested-With
        expose_headers: []
        max_age: 3600
        allow_credentials: true

    paths:
        '^/api/':
            origin_regex: false
            allow_origin:
                - '%env(CORS_ALLOW_ORIGIN)%'
            allow_methods:
                - GET
                - POST
                - PUT
                - PATCH
                - DELETE
                - OPTIONS
            allow_headers:
                - Content-Type
                - Authorization
                - Accept
                - Origin
                - X-Requested-With
            max_age: 3600
            allow_credentials: true