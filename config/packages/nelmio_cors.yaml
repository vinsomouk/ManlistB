nelmio_cors:
    defaults:
        origin_regex: true
        allow_origin:
            - '%env(CORS_ALLOW_ORIGIN)%'
        allow_credentials: true
        allow_headers:
            - Content-Type
            - Authorization
            - Accept
            - Origin
            - X-Requested-With
        allow_methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
        max_age: 3600

    paths:
        '^/api/': null
            