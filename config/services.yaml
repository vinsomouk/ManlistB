parameters:
    uploads_directory: '%kernel.project_dir%/public/uploads/profile'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
            - '../src/Migrations/'

    App\Command\ImportQuestionnaireCommand:
        tags: ['console.command']